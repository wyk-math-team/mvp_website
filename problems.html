<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WYK Maths Team - Problems</title>
    <link rel="stylesheet" href="./styles.css">
    <!-- KaTeX 核心库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js" 
            onload="renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}] });"></script>
    <script src="auth.js"></script>
    <script src="app.js" defer></script>
    <style>
        /* 全局禁止水平滚动 */
        body, html {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        .main-content {
            overflow-x: hidden;
            width: 100%;
            box-sizing: border-box;
        }
        /* 紧凑的题目列表 - 网格对齐 */
        .problems-list {
            display: flex;
            flex-direction: column;
            margin: 0.5rem 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }
        .problems-header {
            display: grid;
            grid-template-columns: 60px 1fr 1.2fr 70px;
            background: #e9ecef;
            padding: 0.5rem 0.8rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }
        .problem-item {
            display: grid;
            grid-template-columns: 60px 1fr 1.2fr 70px;
            align-items: center;
            background: var(--card-bg);
            border-left: 4px solid;
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 0.8rem;
            transition: background 0.2s ease;
            cursor: pointer;
            gap: 0.5rem;
            width: 100%;
            box-sizing: border-box;
        }
        .problem-item:last-child { border-bottom: none; }
        .problem-item.state-not_started { border-left-color: #aaa; background: var(--card-bg); }
        .problem-item.state-failed { border-left-color: var(--danger); background: #fff5f5; }
        .problem-item.state-passed { border-left-color: #2e7d32; background: #f0fff0; }
        .problem-item:hover { background: #f8f9fa; }
        
        .problem-id {
            font-family: monospace;
            font-weight: 700;
            background: #e9ecef;
            padding: 0.1rem 0.3rem;
            border-radius: 16px;
            text-align: center;
            font-size: 0.85rem;
            width: fit-content;
        }
        .problem-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
            font-size: 0.9rem;
            min-width: 0;
        }
        .tags-container {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: flex-start;
            overflow-x: auto;
        }
        .tag {
            background: #f0f0f0;
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            white-space: nowrap;
        }
        .difficulty {
            text-align: right;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .sort-indicator {
            cursor: pointer;
            user-select: none;
            display: inline-block;
        }
        .sort-indicator:hover { background: #d0d7de; border-radius: 12px; padding: 0 0.1rem; }
        @media (max-width: 700px) {
            .problems-header, .problem-item { grid-template-columns: 50px 1fr 1fr 60px; }
            .problem-name { max-width: 120px; }
        }
        @media (max-width: 550px) {
            .problems-header, .problem-item { grid-template-columns: 40px 1fr 1fr 50px; }
            .problem-name { max-width: 80px; }
        }

        .filter-bar {
            background: var(--card-bg);
            border-radius: 4px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            overflow-x: auto;
        }
        .filter-tag-btn {
            background: #f0f2f5;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.2rem 0.7rem;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-tag-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .problem-detail { background: var(--card-bg); border-radius: 4px; padding: 1.2rem; box-shadow: var(--shadow-sm); overflow-x: auto; max-width: 100%; box-sizing: border-box; }
        .detail-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
        .back-btn { background: none; border: 1px solid var(--border-color); border-radius: 4px; padding: 0.3rem 0.7rem; cursor: pointer; font-size: 0.85rem; }
        .problem-id-badge {
            font-family: monospace;
            font-weight: 600;
            background: #e9ecef;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        .problem-name-detail { font-size: 1.2rem; font-weight: 700; display: inline-flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
        .answer-area { margin: 1rem 0; display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
        .nav-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
        }
        .nav-btn:hover { background: var(--accent-hover); }
        .answer-input { padding: 0.4rem 0.7rem; border: 1px solid var(--border-color); border-radius: 4px; width: 160px; max-width: 100%; box-sizing: border-box; }
        .check-btn, .submissions-btn { border: none; border-radius: 4px; padding: 0.4rem 1rem; cursor: pointer; font-weight: 500; }
        .check-btn { background: var(--accent); color: white; }
        .check-btn:disabled {
            opacity: 0.6;
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .check-btn.cooldown:disabled {
            background-color: #5a6e8a;
            opacity: 1;
            cursor: not-allowed;
        }
        .submissions-btn { background: #6c757d; color: white; }
        .feedback { margin-left: 0.5rem; }
        .feedback.correct { color: #2e7d32; }
        .feedback.wrong { color: var(--danger); }
        .statement-content { margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid var(--border-color); overflow-x: auto; }
        .loading-msg { text-align: center; padding: 2rem; color: var(--text-secondary); }
        
        #appContainer, .sidebar, .topbar { max-width: 100%; overflow-x: hidden; }
        
        /* 画板样式 */
        .drawing-board {
            margin-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }
        .drawing-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 1rem;
            background: #f8f9fa;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
        .drawing-tools button {
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            padding: 0;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
        }
        .drawing-tools button.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .drawing-tools button:not(.active):hover { background: #e9ecef; }
        .drawing-tools label { font-weight: 500; margin-right: 0.2rem; }
        .drawing-tools input, .drawing-tools select {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
        }
        .drawing-board canvas {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            cursor: crosshair;
            touch-action: none;
        }
    </style>
</head>
<body class="index-body">
    <div id="appContainer">
        <header class="topbar">
            <div class="topbar-left"><span class="brand-name"><a href="./index.html">WYK Maths Team</a></span></div>
            <div class="topbar-right">
                <div class="user-menu" id="userMenu" style="cursor: pointer;">
                    <span class="username-display">
                        <span class="user-icon">👤</span>
                        <span id="currentUsername">Guest</span>
                        <span class="dropdown-arrow">▾</span>
                    </span>
                    <div class="logout-dropdown"><button class="logout-btn" id="logoutBtn">Logout</button></div>
                </div>
                <div class="clock"><span class="clock-time" id="clockTime">00:00:00</span></div>
            </div>
        </header>
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav"><ul>
                <li><a href="./problems.html" class="sidebar-link require-login active">Problems</a></li>
                <li><a href="./submissions.html" class="sidebar-link require-login">Your submissions</a></li>
                <li><a href="./ssubmissions.html" class="sidebar-link require-login">All submissions</a></li>
                <li><a href="./resources.html" class="sidebar-link require-login">Resources</a></li>
                <li><a href="./ranklist.html" class="sidebar-link require-login">Leaderboard</a></li>
                <li><a href="./terminal.html" class="sidebar-link require-login">(Dev)Terminal</a></li>
                <li><a href="./admin.html" class="sidebar-link require-login">Messages</a></li>
                <li><a href="./template.html" class="sidebar-link require-login">Settings</a></li>
            </ul></nav>
        </aside>
        <main class="main-content" id="mainContent">
            <div class="loading-msg">Loading problems...</div>
        </main>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">☰</button>
    </div>

    <div id="loginModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header"><h2>Sign In Required</h2><button class="modal-close" id="closeModalBtn">&times;</button></div>
            <form id="modalLoginForm">
                <div class="form-group"><label for="modalUsername">Username</label><input type="text" id="modalUsername" placeholder="Username" required></div>
                <div class="form-group"><label for="modalPassword">Password</label><input type="password" id="modalPassword" placeholder="Password" required></div>
                <div id="modalLoginError" class="login-error hidden"></div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <p class="login-hint">Demo accounts: admin / admin123  •  user1 / password1</p>
        </div>
    </div>

    <script>
        if (typeof isLoggedIn === 'function' && !isLoggedIn()) {
            window.location.href = 'index.html';
        }

        function getCurrentUserName() {
            if (typeof getCurrentUser === 'function') {
                const user = getCurrentUser();
                if (user && (user.username || user.displayName)) return user.username || user.displayName;
            }
            return 'guest';
        }

        const PROBLEMS_DATA_URL = './qs.json';

        (function() {
            let problemsData = [];
            let dataLoaded = false;

            const fallbackData = [
                { id: 1, name: "Quadratic Equation", statement: "Solve $x^2 - 5x + 6 = 0$. Enter the **positive** root.", ans: 3, difficulty: 2.5, tags: ["algebra", "quadratic"] },
                { id: 2, name: "Limit", statement: "Evaluate $\\lim_{x \\to 0} \\frac{\\sin x}{x}$.", ans: 1, difficulty: 3.0, tags: ["calculus", "limit"] },
                { id: 3, name: "Derivative", statement: "Find derivative of $x^3 \\ln x$ at $x=e$ (simplified).", ans: 4, difficulty: 4.2, tags: ["calculus", "derivative"] },
                { id: 4, name: "Integral", statement: "Compute $\\int_0^1 x^2 \\, dx$ (as fraction).", ans: 1/3, difficulty: 2.0, tags: ["calculus", "integral"] },
                { id: 5, name: "Matrix Multiplication", statement: "$A=\\begin{pmatrix}1&2\\\\3&4\\end{pmatrix}, B=\\begin{pmatrix}2&0\\\\1&2\\end{pmatrix}$, find (1,1) entry of AB.", ans: 4, difficulty: 3.5, tags: ["linear algebra", "matrix"] }
            ];

            function getUserKey(baseKey) { return `${baseKey}_${getCurrentUserName()}`; }
            function getDefaultStates() { const s = {}; problemsData.forEach(p => s[p.id] = 'not_started'); return s; }
            function loadStates() {
                const key = getUserKey('problemStates');
                const stored = localStorage.getItem(key);
                if (!stored) return getDefaultStates();
                try { return { ...getDefaultStates(), ...JSON.parse(stored) }; } catch(e) { return getDefaultStates(); }
            }
            function saveStates(states) { localStorage.setItem(getUserKey('problemStates'), JSON.stringify(states)); }
            function updateProblemState(pid, newState) {
                const s = loadStates();
                if (s[pid] === 'passed' && newState !== 'passed') return false;
                s[pid] = newState;
                saveStates(s);
                return true;
            }
            function getProblemState(pid) { return loadStates()[pid] || 'not_started'; }
            function addSubmission(pid, answer, isCorrect) {
                const subs = getSubmissions();
                subs.push({ problemId: pid, answer: answer, isCorrect: isCorrect, timestamp: new Date().toISOString() });
                localStorage.setItem(getUserKey('submissions'), JSON.stringify(subs));
            }
            function getSubmissions() {
                const stored = localStorage.getItem(getUserKey('submissions'));
                if (!stored) return [];
                try { return JSON.parse(stored); } catch(e) { return []; }
            }

            const FILTER_TAGS_KEY = getUserKey('problemFilterTags');
            let activeTags = new Set();
            function loadFilterTags() {
                const stored = localStorage.getItem(FILTER_TAGS_KEY);
                if (stored) try { const arr = JSON.parse(stored); if (Array.isArray(arr)) activeTags = new Set(arr); } catch(e) {}
            }
            function saveFilterTags() { localStorage.setItem(FILTER_TAGS_KEY, JSON.stringify(Array.from(activeTags))); }
            function toggleTag(tag) {
                if (activeTags.has(tag)) activeTags.delete(tag);
                else activeTags.add(tag);
                saveFilterTags();
            }

            const SORT_MODE_KEY = getUserKey('problemSortMode');
            let sortMode = 0;
            function loadSortMode() {
                const saved = localStorage.getItem(SORT_MODE_KEY);
                if (saved !== null) { const mode = parseInt(saved); if (!isNaN(mode) && mode >= 0 && mode <= 2) sortMode = mode; }
            }
            function saveSortMode() { localStorage.setItem(SORT_MODE_KEY, sortMode.toString()); }
            function sortProblems(problems) {
                const sorted = [...problems];
                if (sortMode === 0) sorted.sort((a, b) => a.id - b.id);
                else if (sortMode === 1) sorted.sort((a, b) => {
                    let da = a.difficulty === 0 ? Infinity : a.difficulty;
                    let db = b.difficulty === 0 ? Infinity : b.difficulty;
                    if (da === db) return a.id - b.id;
                    return da - db;
                });
                else if (sortMode === 2) sorted.sort((a, b) => {
                    let da = a.difficulty === 0 ? 0 : a.difficulty;
                    let db = b.difficulty === 0 ? 0 : b.difficulty;
                    if (da === db) return a.id - b.id;
                    return db - da;
                });
                return sorted;
            }

            function getUrlParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param);
            }
            function setUrlParam(param, value) {
                const url = new URL(window.location);
                url.searchParams.set(param, value);
                window.history.pushState({}, '', url);
            }
            function removeUrlParam(param) {
                const url = new URL(window.location);
                url.searchParams.delete(param);
                window.history.pushState({}, '', url);
            }

            let mainContainer = document.getElementById('mainContent');
            const SCROLL_KEY = 'problemsListScrollY';
            function saveScrollPosition() { sessionStorage.setItem(SCROLL_KEY, window.scrollY); }
            function restoreScrollPosition() {
                const saved = sessionStorage.getItem(SCROLL_KEY);
                if (saved !== null) setTimeout(() => window.scrollTo(0, parseInt(saved)), 50);
            }
            function clearScrollPosition() { sessionStorage.removeItem(SCROLL_KEY); window.scrollTo(0, 0); }
            let scrollListenerActive = false;
            function bindScrollListener() { if (!scrollListenerActive) { window.addEventListener('scroll', saveScrollPosition); scrollListenerActive = true; } }
            function unbindScrollListener() { if (scrollListenerActive) { window.removeEventListener('scroll', saveScrollPosition); scrollListenerActive = false; } }
            function resetScrollOnFilterOrSort() { clearScrollPosition(); }

            function getAllTags() {
                const set = new Set();
                problemsData.forEach(p => p.tags.forEach(t => set.add(t)));
                return Array.from(set).sort();
            }
            function getFilteredProblems() {
                if (activeTags.size === 0) return problemsData;
                return problemsData.filter(p => p.tags.some(tag => activeTags.has(tag)));
            }
            function getStateClass(state) {
                if (state === 'failed') return 'state-failed';
                if (state === 'passed') return 'state-passed';
                return 'state-not_started';
            }

            function renderProblemList() {
                if (!problemsData.length) { mainContainer.innerHTML = `<div class="loading-msg">No problems available.</div>`; return; }
                let filtered = getFilteredProblems();
                filtered = sortProblems(filtered);
                const allTags = getAllTags();
                const states = loadStates();

                let html = `<div class="updates-panel" style="padding:0.5rem;">
                            <div class="updates-header"><h2>Problem Set</h2></div>
                            <div class="filter-bar"><span style="font-weight:600;">Filter tags:</span>`;
                allTags.forEach(tag => {
                    const isActive = activeTags.has(tag);
                    html += `<button class="filter-tag-btn ${isActive ? 'active' : ''}" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`;
                });
                html += `</div><div class="problems-list">
                            <div class="problems-header">
                                <span>ID</span>
                                <span>Name</span>
                                <span>Tags</span>
                                <span class="sort-indicator" id="levelSortBtn">Level ${sortMode === 0 ? '↕️' : (sortMode === 1 ? '⬆️' : '⬇️')}</span>
                            </div>`;
                if (filtered.length === 0) {
                    html += `<div class="problem-item" style="justify-content:center; grid-column:1/-1;">No problems match the selected tags.</div>`;
                } else {
                    filtered.forEach(prob => {
                        const state = states[prob.id] || 'not_started';
                        const statusEmoji = state === 'passed' ? ' ✅' : (state === 'failed' ? ' ❌' : '');
                        html += `<div class="problem-item ${getStateClass(state)}" data-id="${prob.id}">
                                    <div class="problem-id">${prob.id}</div>
                                    <div class="problem-name" title="${escapeHtml(prob.name)}">${escapeHtml(prob.name)}${statusEmoji}</div>
                                    <div class="tags-container">${prob.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                                    <div class="difficulty">${prob.difficulty === 0 ? '∞' : prob.difficulty.toFixed(1)}</div>
                                </div>`;
                    });
                }
                html += `</div></div>`;
                mainContainer.innerHTML = html;

                document.querySelectorAll('.problem-item').forEach(el => {
                    const id = parseInt(el.getAttribute('data-id'));
                    if (id) el.addEventListener('click', () => { saveScrollPosition(); window.location.href = `problems.html?problem_id=${id}`; });
                });
                document.querySelectorAll('.filter-tag-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const tag = btn.getAttribute('data-tag');
                        toggleTag(tag);
                        resetScrollOnFilterOrSort();
                        renderProblemList();
                    });
                });
                const sortBtn = document.getElementById('levelSortBtn');
                if (sortBtn) sortBtn.addEventListener('click', (e) => { e.stopPropagation(); sortMode = (sortMode + 1) % 3; saveSortMode(); resetScrollOnFilterOrSort(); renderProblemList(); });
                restoreScrollPosition();
                bindScrollListener();
            }

            function isStrictNumericString(str) {
                if (typeof str !== 'string') str = String(str);
                str = str.trim();
                if (str === '') return false;
                const numericRegex = /^[+-]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][+-]?\d+)?$/;
                return numericRegex.test(str);
            }

            let currentCanvas = null;
            let currentDrawingCtx = null;
            let drawing = false;
            let currentProblemIdForCanvas = null;
            let resizeObserver = null;

            // 调整 canvas 实际分辨率（让实际像素尺寸为 CSS 宽度的 2 倍）
            function resizeCanvasToDisplaySize(canvas) {
                const rect = canvas.getBoundingClientRect();
                if (rect.width === 0) return;
                const ratio=5;
                // 目标分辨率：CSS 宽度的 2 倍，高度按比例（保持宽高比）
                const targetWidth = Math.max(rect.width*ratio, 1);
                const targetHeight = Math.round(targetWidth * (400 / 600)); // 维持 600:400 比例
                if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                    const imgData = canvas.toDataURL(); // 保存当前内容
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                    // 恢复之前的内容（缩放绘制）
                    if (imgData !== 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==') {
                        const img = new Image();
                        img.onload = () => {
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            saveCanvasToLocalStorage(currentProblemIdForCanvas);
                        };
                        img.src = imgData;
                    }
                    // 重新设置绘图上下文属性（笔触样式等）
                    const ctx = canvas.getContext('2d');
                    ctx.lineCap = 'round';
                    // 根据当前模式恢复设置（需要在外部调用 setPen/setEraser，但为了简单，让用户重新选择工具触发样式更新）
                    // 这里简单触发一下模式重设
                    const brushBtn = document.getElementById('brushBtn');
                    const eraserBtn = document.getElementById('eraserBtn');
                    if (brushBtn && brushBtn.classList.contains('active')) {
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.strokeStyle = document.getElementById('penColor')?.value || '#000000';
                        ctx.lineWidth = parseInt(document.getElementById('penSize')?.value || 3, 10);
                    } else if (eraserBtn && eraserBtn.classList.contains('active')) {
                        const eraserMode = document.getElementById('eraserModeSelect')?.value === 'pixel' ? 'pixel' : 'component';
                        if (eraserMode === 'pixel') {
                            ctx.globalCompositeOperation = 'destination-out';
                            ctx.strokeStyle = 'rgba(0,0,0,1)';
                        }
                        ctx.lineWidth = parseInt(document.getElementById('penSize')?.value || 3, 10);
                    }
                }
            }

            function saveCanvasToLocalStorage(problemId) {
                if (!currentCanvas) return;
                const username = getCurrentUserName();
                const key = `drawing_${username}_${problemId}`;
                try {
                    const dataURL = currentCanvas.toDataURL();
                    localStorage.setItem(key, dataURL);
                } catch(e) { console.warn('Failed to save drawing:', e); }
            }

            function loadCanvasFromLocalStorage(problemId) {
                if (!currentCanvas) return;
                const username = getCurrentUserName();
                const key = `drawing_${username}_${problemId}`;
                const saved = localStorage.getItem(key);
                if (saved && saved !== 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==') {
                    const img = new Image();
                    img.onload = () => {
                        const ctx = currentCanvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, currentCanvas.width, currentCanvas.height);
                    };
                    img.src = saved;
                }
            }

            function clearCanvasStorage(problemId) {
                const username = getCurrentUserName();
                const key = `drawing_${username}_${problemId}`;
                localStorage.removeItem(key);
            }

            function initDrawingBoard(canvasId, problemId) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                if (currentCanvas === canvas) return;
                if (currentCanvas) {
                    currentCanvas.removeEventListener('mousedown', startDraw);
                    currentCanvas.removeEventListener('mousemove', draw);
                    currentCanvas.removeEventListener('mouseup', endDraw);
                    currentCanvas.removeEventListener('mouseleave', endDraw);
                    currentCanvas.removeEventListener('touchstart', startDraw);
                    currentCanvas.removeEventListener('touchmove', draw);
                    currentCanvas.removeEventListener('touchend', endDraw);
                    currentCanvas.removeEventListener('touchcancel', endDraw);
                    if (resizeObserver) resizeObserver.disconnect();
                }
                currentCanvas = canvas;
                currentProblemIdForCanvas = problemId;
                const ctx = canvas.getContext('2d');
                currentDrawingCtx = ctx;

                // 初始分辨率调整
                resizeCanvasToDisplaySize(canvas);
                // 监听窗口大小变化，动态调整分辨率
                if (resizeObserver) resizeObserver.disconnect();
                resizeObserver = new ResizeObserver(() => {
                    resizeCanvasToDisplaySize(canvas);
                    loadCanvasFromLocalStorage(problemId);
                });
                resizeObserver.observe(canvas.parentElement);

                const brushBtn = document.getElementById('brushBtn');
                const eraserBtn = document.getElementById('eraserBtn');
                const eraserModeSelect = document.getElementById('eraserModeSelect');
                const penColorPicker = document.getElementById('penColor');
                const penSizeSlider = document.getElementById('penSize');
                const clearBtn = document.getElementById('clearCanvasBtn');

                let currentMode = 'pen';
                let eraserMode = 'pixel';

                function setPen() {
                    currentMode = 'pen';
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = penColorPicker.value;
                    ctx.lineWidth = parseInt(penSizeSlider.value, 10);
                    ctx.lineCap = 'round';
                    brushBtn.classList.add('active');
                    eraserBtn.classList.remove('active');
                }
                function setEraser() {
                    currentMode = 'eraser';
                    if (eraserMode === 'pixel') {
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.strokeStyle = 'rgba(0,0,0,1)';
                    } else if (eraserMode === 'component') {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        saveCanvasToLocalStorage(problemId);
                        setPen();
                        return;
                    }
                    ctx.lineWidth = parseInt(penSizeSlider.value, 10);
                    ctx.lineCap = 'round';
                    brushBtn.classList.remove('active');
                    eraserBtn.classList.add('active');
                }

                brushBtn.addEventListener('click', setPen);
                eraserBtn.addEventListener('click', () => {
                    eraserMode = eraserModeSelect.value;
                    setEraser();
                });
                eraserModeSelect.addEventListener('change', (e) => {
                    eraserMode = e.target.value;
                    if (currentMode === 'eraser') setEraser();
                });
                penColorPicker.addEventListener('input', () => {
                    if (currentMode === 'pen') ctx.strokeStyle = penColorPicker.value;
                });
                penSizeSlider.addEventListener('input', () => {
                    ctx.lineWidth = parseInt(penSizeSlider.value, 10);
                });
                clearBtn.addEventListener('click', () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    saveCanvasToLocalStorage(problemId);
                });

                setPen();

                // 恢复保存的内容（如有）
                loadCanvasFromLocalStorage(problemId);

                function startDraw(e) {
                    e.preventDefault();
                    drawing = true;
                    const pos = getMousePos(canvas, e);
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y);
                    ctx.lineTo(pos.x, pos.y);
                    ctx.stroke();
                }
                function draw(e) {
                    if (!drawing) return;
                    e.preventDefault();
                    const pos = getMousePos(canvas, e);
                    ctx.lineTo(pos.x, pos.y);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y);
                }
                function endDraw(e) {
                    if (drawing) {
                        drawing = false;
                        ctx.beginPath();
                        saveCanvasToLocalStorage(problemId);
                    }
                }
                function getMousePos(canvas, evt) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    let clientX, clientY;
                    if (evt.touches) {
                        clientX = evt.touches[0].clientX;
                        clientY = evt.touches[0].clientY;
                    } else {
                        clientX = evt.clientX;
                        clientY = evt.clientY;
                    }
                    let x = (clientX - rect.left) * scaleX;
                    let y = (clientY - rect.top) * scaleY;
                    x = Math.min(Math.max(0, x), canvas.width);
                    y = Math.min(Math.max(0, y), canvas.height);
                    return { x, y };
                }

                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
                canvas.addEventListener('touchstart', startDraw);
                canvas.addEventListener('touchmove', draw);
                canvas.addEventListener('touchend', endDraw);
                canvas.addEventListener('touchcancel', endDraw);
            }

            // 导航函数：切换到上一个/下一个存在的题目ID（基于problemsData中存在的id）
            function navigateProblem(delta) {
                if (!problemsData.length) return;
                const currentId = parseInt(getUrlParam('problem_id'));
                if (isNaN(currentId)) return;
                // 获取所有存在的ID并排序
                const allIds = problemsData.map(p => p.id).sort((a,b) => a-b);
                const currentIndex = allIds.indexOf(currentId);
                if (currentIndex === -1) return;
                let newIndex = currentIndex + delta;
                if (newIndex < 0) newIndex = allIds.length - 1;   // 循环到最后一个
                if (newIndex >= allIds.length) newIndex = 0;       // 循环到第一个
                const newId = allIds[newIndex];
                if (newId !== currentId) {
                    setUrlParam('problem_id', newId);
                    renderProblemDetail(newId);
                }
            }

            function renderProblemDetail(problemId) {
                if (window.currentCooldownTimer) clearInterval(window.currentCooldownTimer);
                unbindScrollListener();
                const prob = problemsData.find(p => p.id === problemId);
                if (!prob) { renderProblemList(); return; }
                const currentState = getProblemState(problemId);
                const diffStr = prob.difficulty === 0 ? '∞' : prob.difficulty.toFixed(1);
                const tagsStr = prob.tags.join(', ');
                const statusEmoji = currentState === 'passed' ? ' ✅' : (currentState === 'failed' ? ' ❌' : '');
                const nameWithStatus = `${escapeHtml(prob.name)}${statusEmoji}`;
                const canvasId = `canvas_${problemId}`;

                const html = `<div class="problem-detail">
                    <div class="detail-header">
                        <button class="back-btn" id="backToListBtn">← Back</button>
                        <span class="problem-id-badge">#${prob.id}</span>
                        <span class="problem-name-detail">${nameWithStatus}</span>
                        <span style="margin-left:auto; font-size:0.8rem;">Lv. ${diffStr}</span>
                        <span style="font-size:0.8rem;">${escapeHtml(tagsStr)}</span>
                    </div>
                    <div class="answer-area">
                        <button id="prevProblemBtn" class="nav-btn" title="Previous problem">←</button>
                        <button id="nextProblemBtn" class="nav-btn" title="Next problem">→</button>
                        <label style="font-weight:500;">Your Answer:</label>
                        <input type="text" id="answerInput" class="answer-input" placeholder="Enter answer" autocomplete="off">
                        <button id="checkAnswerBtn" class="check-btn">Submit</button>
                        <button id="submissionsBtn" class="submissions-btn">Submissions</button>
                        <span id="feedbackMsg" class="feedback"></span>
                    </div>
                    <div class="statement-content" id="statementContent">${prob.statement}</div>
                    <div class="drawing-board">
                        <div class="drawing-tools">
                            <button id="brushBtn" class="active" title="Brush">P</button>
                            <button id="eraserBtn" class="" title="Eraser">E</button>
                            <select id="eraserModeSelect">
                                <option value="pixel">Pixel Erase</option>
                            </select>
                            <label>Color:</label>
                            <input type="color" id="penColor" value="#000000">
                            <label>Size:</label>
                            <input type="range" id="penSize" min="10" max="50" value="12">
                            <button id="clearCanvasBtn" title="Clear All">🗑️</button>
                        </div>
                        <canvas id="${canvasId}" style="width:100%; height:auto; background:white; touch-action:none;"></canvas>
                    </div>
                </div>`;
                mainContainer.innerHTML = html;

                const stmtDiv = document.getElementById('statementContent');
                if (stmtDiv && typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(stmtDiv, { delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}] });
                }

                document.getElementById('backToListBtn')?.addEventListener('click', () => { removeUrlParam('problem_id'); renderProblemList(); });
                document.getElementById('submissionsBtn')?.addEventListener('click', () => { window.location.href = `submissions.html?problem_id=${problemId}`; });
                document.getElementById('prevProblemBtn')?.addEventListener('click', () => navigateProblem(-1));
                document.getElementById('nextProblemBtn')?.addEventListener('click', () => navigateProblem(1));

                const checkBtn = document.getElementById('checkAnswerBtn');
                const input = document.getElementById('answerInput');
                const fb = document.getElementById('feedbackMsg');

                if (!checkBtn || !input) return;

                const answerStr = String(prob.ans);
                const isAnswerNumeric = isStrictNumericString(answerStr);
                if (!isAnswerNumeric) {
                    checkBtn.disabled = true;
                    checkBtn.title = "ans is NaN";
                    if (fb) { fb.textContent = "System Error 01"; fb.className = "feedback wrong"; }
                    initDrawingBoard(canvasId, problemId);
                    return;
                }

                const correctNumeric = parseFloat(answerStr);
                let isCooldown = false;

                function updateSubmitButton() {
                    if (!checkBtn) return;
                    if (isCooldown) {
                        checkBtn.disabled = true;
                        checkBtn.classList.add('cooldown');
                    } else {
                        checkBtn.disabled = false;
                        checkBtn.classList.remove('cooldown');
                        if (checkBtn.textContent !== "Submit") checkBtn.textContent = "Submit";
                    }
                }
                updateSubmitButton();

                checkBtn.addEventListener('click', () => {
                    if (checkBtn.disabled) return;
                    const val = input.value.trim();
                    if (val === "") { fb.textContent = "Enter answer"; fb.className = "feedback wrong"; return; }
                    const num = parseFloat(val);
                    if (isNaN(num)) { fb.textContent = "Enter a number"; fb.className = "feedback wrong"; return; }
                    const isCorrect = Math.abs(num - correctNumeric) < 1e-6;
                    addSubmission(prob.id, val, isCorrect);
                    if (isCorrect) {
                        if (currentState !== 'passed') updateProblemState(prob.id, 'passed');
                        fb.textContent = currentState === 'passed' ? "Accepted (Already solved)" : "Accepted";
                        fb.className = "feedback correct";
                    } else {
                        if (currentState !== 'passed') updateProblemState(prob.id, 'failed');
                        fb.textContent = "Wrong Answer";
                        fb.className = "feedback wrong";
                    }

                    if (window.currentCooldownTimer) clearInterval(window.currentCooldownTimer);
                    isCooldown = true;
                    updateSubmitButton();
                    const startTime = Date.now();
                    const COOLDOWN_MS = 5000;
                    const updateCooldownDisplay = () => {
                        const elapsed = Date.now() - startTime;
                        const remaining = Math.max(0, (COOLDOWN_MS - elapsed) / 1000);
                        if (remaining <= 0) {
                            clearInterval(window.currentCooldownTimer);
                            window.currentCooldownTimer = null;
                            isCooldown = false;
                            if (checkBtn) { checkBtn.textContent = "Submit"; updateSubmitButton(); }
                        } else {
                            if (checkBtn) checkBtn.textContent = `${remaining.toFixed(2)}`;
                        }
                    };
                    updateCooldownDisplay();
                    window.currentCooldownTimer = setInterval(updateCooldownDisplay, 100);
                });

                initDrawingBoard(canvasId, problemId);
            }

            function initRouting() {
                const pid = getUrlParam('problem_id');
                if (pid && !isNaN(parseInt(pid)) && problemsData.some(p => p.id == pid)) renderProblemDetail(parseInt(pid));
                else renderProblemList();
                window.addEventListener('popstate', () => {
                    const newPid = getUrlParam('problem_id');
                    if (newPid && !isNaN(parseInt(newPid)) && problemsData.some(p => p.id == newPid)) renderProblemDetail(parseInt(newPid));
                    else renderProblemList();
                });
            }

            function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

            function loadExternalData() {
                if (window.problemsData && Array.isArray(window.problemsData) && window.problemsData.length) {
                    problemsData = window.problemsData;
                    loadSortMode();
                    loadFilterTags();
                    initRouting();
                    return;
                }
                fetch(PROBLEMS_DATA_URL)
                    .then(response => response.json())
                    .then(data => { if (Array.isArray(data) && data.length) problemsData = data; else throw new Error('Invalid data'); loadSortMode(); loadFilterTags(); initRouting(); })
                    .catch(err => { console.warn('Failed to load external problems data, using fallback:', err); problemsData = fallbackData; loadSortMode(); loadFilterTags(); initRouting(); });
            }
            loadExternalData();
        })();
    </script>
