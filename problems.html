<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WYK Maths Team - Problems</title>
    <link rel="stylesheet" href="./styles.css">
    <!-- KaTeX 核心库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js" 
            onload="renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}] });"></script>
    <script src="auth.js"></script>
    <script src="app.js" defer></script>
    <style>
        /* 紧凑的题目列表 - 像表格一样 */
        .problems-list {
            display: flex;
            flex-direction: column;
            margin: 0.5rem 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }
        .problem-item {
            background: var(--card-bg);
            border-left: 4px solid;
            border-bottom: 1px solid var(--border-color);
            padding: 0.6rem 0.8rem;
            transition: background 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .problem-item:last-child { border-bottom: none; }
        .problem-item.state-not_started { border-left-color: #aaa; background: var(--card-bg); }
        .problem-item.state-failed { border-left-color: var(--danger); background: #fff5f5; }
        .problem-item.state-passed { border-left-color: #2e7d32; background: #f0fff0; }
        .problem-item:hover { background: #f8f9fa; }
        .problem-id {
            font-family: monospace;
            font-weight: 700;
            background: #e9ecef;
            padding: 0.1rem 0.5rem;
            border-radius: 16px;
            min-width: 40px;
            text-align: center;
            font-size: 0.85rem;
        }
        .problem-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .tags-container {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            flex: 1;
            justify-content: flex-start;
        }
        .tag {
            background: #f0f0f0;
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            white-space: nowrap;
        }
        .difficulty {
            background: #eef2ff;
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
            margin-left: auto;
        }
        @media (max-width: 700px) { .problem-name { max-width: 120px; } }
        @media (max-width: 550px) { .problem-name { max-width: 80px; } }

        /* 筛选栏 */
        .filter-bar {
            background: var(--card-bg);
            border-radius: 4px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-tag-btn {
            background: #f0f2f5;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.2rem 0.7rem;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .filter-tag-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 详情样式 */
        .problem-detail { background: var(--card-bg); border-radius: 4px; padding: 1.2rem; box-shadow: var(--shadow-sm); }
        .detail-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
        .back-btn { background: none; border: 1px solid var(--border-color); border-radius: 4px; padding: 0.3rem 0.7rem; cursor: pointer; font-size: 0.85rem; }
        .problem-name-detail { font-size: 1.2rem; font-weight: 700; }
        .answer-area { margin: 1rem 0; display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
        .answer-input { padding: 0.4rem 0.7rem; border: 1px solid var(--border-color); border-radius: 4px; width: 160px; }
        .check-btn, .submissions-btn { border: none; border-radius: 4px; padding: 0.4rem 1rem; cursor: pointer; font-weight: 500; }
        .check-btn { background: var(--accent); color: white; }
        .submissions-btn { background: #6c757d; color: white; }
        .feedback { margin-left: 0.5rem; }
        .feedback.correct { color: #2e7d32; }
        .feedback.wrong { color: var(--danger); }
        .statement-content { margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid var(--border-color); }
        .loading-msg {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body class="index-body">
    <div id="appContainer">
        <header class="topbar">
            <div class="topbar-left"><span class="brand-name"><a href="/index.html">WYK Maths Team</a></span></div>
            <div class="topbar-right">
                <div class="user-menu" id="userMenu" style="cursor: pointer;">
                    <span class="username-display">
                        <span class="user-icon">👤</span>
                        <span id="currentUsername">Guest</span>
                        <span class="dropdown-arrow">▾</span>
                    </span>
                    <div class="logout-dropdown"><button class="logout-btn" id="logoutBtn">Logout</button></div>
                </div>
                <div class="clock"><span class="clock-time" id="clockTime">00:00:00</span></div>
            </div>
        </header>
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav"><ul>
                <li><a href="./problems.html" class="sidebar-link require-login active">Problems</a></li>
                <li><a href="./submissions.html" class="sidebar-link require-login">Your submissions</a></li>
                <li><a href="./ssubmissions.html" class="sidebar-link require-login">All submissions</a></li>
                <li><a href="./resources.html" class="sidebar-link require-login">Resources</a></li>
                <li><a href="./ranklist.html" class="sidebar-link require-login">Leaderboard</a></li>
                <li><a href="./terminal.html" class="sidebar-link require-login">(Dev)Terminal</a></li>
                <li><a href="./admin.html" class="sidebar-link require-login">Messages</a></li>
                <li><a href="./template.html" class="sidebar-link require-login">Settings</a></li>
            </ul></nav>
        </aside>
        <main class="main-content" id="mainContent">
            <div class="loading-msg">Loading problems...</div>
        </main>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">☰</button>
    </div>

    <!-- 登录模态框 -->
    <div id="loginModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header"><h2>Sign In Required</h2><button class="modal-close" id="closeModalBtn">&times;</button></div>
            <form id="modalLoginForm">
                <div class="form-group"><label for="modalUsername">Username</label><input type="text" id="modalUsername" placeholder="Username" required></div>
                <div class="form-group"><label for="modalPassword">Password</label><input type="password" id="modalPassword" placeholder="Password" required></div>
                <div id="modalLoginError" class="login-error hidden"></div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <p class="login-hint">Demo accounts: admin / admin123  •  user1 / password1</p>
        </div>
    </div>

    <script>
        // ========== 登录检查 ==========
        if (typeof isLoggedIn === 'function' && !isLoggedIn()) {
            window.location.href = 'index.html';
        }

        // ========== 配置外部数据路径 ==========
        // 您可以修改这个变量来指向您的题目数据文件（支持 .json 或 .js 文件）
        const PROBLEMS_DATA_URL = './qs.json';   // 默认 JSON 文件
        // 如果希望使用 JS 模块，可以设置 window.problemsData 全局变量，优先使用

        (function() {
            let problemsData = [];        // 将从外部加载
            let dataLoaded = false;
            let loadError = false;

            // 默认后备数据（当外部加载失败时使用）
            const fallbackData = [
                { id: 1, name: "Quadratic Equation", statement: "Solve $x^2 - 5x + 6 = 0$. Enter the **positive** root.", ans: 3, difficulty: 2.5, tags: ["algebra", "quadratic"] },
                { id: 2, name: "Limit", statement: "Evaluate $\\lim_{x \\to 0} \\frac{\\sin x}{x}$.", ans: 1, difficulty: 3.0, tags: ["calculus", "limit"] },
                { id: 3, name: "Derivative", statement: "Find derivative of $x^3 \\ln x$ at $x=e$ (simplified).", ans: 4, difficulty: 4.2, tags: ["calculus", "derivative"] },
                { id: 4, name: "Integral", statement: "Compute $\\int_0^1 x^2 \\, dx$ (as fraction).", ans: 1/3, difficulty: 2.0, tags: ["calculus", "integral"] },
                { id: 5, name: "Matrix Multiplication", statement: "$A=\\begin{pmatrix}1&2\\\\3&4\\end{pmatrix}, B=\\begin{pmatrix}2&0\\\\1&2\\end{pmatrix}$, find (1,1) entry of AB.", ans: 4, difficulty: 3.5, tags: ["linear algebra", "matrix"] }
            ];

            // 状态管理相关函数（依赖 problemsData）
            const STORAGE_KEY_STATE = 'problemStates';
            const STORAGE_KEY_SUBMISSIONS = 'submissions';

            function getDefaultStates() {
                const s = {};
                problemsData.forEach(p => s[p.id] = 'not_started');
                return s;
            }
            function loadStates() {
                const stored = localStorage.getItem(STORAGE_KEY_STATE);
                if (!stored) return getDefaultStates();
                try {
                    return { ...getDefaultStates(), ...JSON.parse(stored) };
                } catch(e) {
                    return getDefaultStates();
                }
            }
            function saveStates(states) {
                localStorage.setItem(STORAGE_KEY_STATE, JSON.stringify(states));
            }
            function updateProblemState(pid, newState) {
                const s = loadStates();
                if (s[pid] === 'passed' && newState !== 'passed') return false;
                s[pid] = newState;
                saveStates(s);
                return true;
            }
            function getProblemState(pid) {
                return loadStates()[pid] || 'not_started';
            }
            function addSubmission(pid, answer, isCorrect) {
                const subs = getSubmissions();
                subs.push({ problemId: pid, answer: answer, isCorrect: isCorrect, timestamp: new Date().toISOString() });
                localStorage.setItem(STORAGE_KEY_SUBMISSIONS, JSON.stringify(subs));
            }
            function getSubmissions() {
                const stored = localStorage.getItem(STORAGE_KEY_SUBMISSIONS);
                if (!stored) return [];
                try {
                    return JSON.parse(stored);
                } catch(e) {
                    return [];
                }
            }

            // URL 参数处理
            function getUrlParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param);
            }
            function removeUrlParam(param) {
                const url = new URL(window.location);
                url.searchParams.delete(param);
                window.history.pushState({}, '', url);
            }

            // 渲染逻辑（依赖 problemsData）
            let activeTag = null;
            let mainContainer = document.getElementById('mainContent');

            function getAllTags() {
                const set = new Set();
                problemsData.forEach(p => p.tags.forEach(t => set.add(t)));
                return Array.from(set).sort();
            }
            function getFilteredProblems() {
                if (!activeTag) return problemsData;
                return problemsData.filter(p => p.tags.includes(activeTag));
            }
            function getStateClass(state) {
                if (state === 'failed') return 'state-failed';
                if (state === 'passed') return 'state-passed';
                return 'state-not_started';
            }

            function renderProblemList() {
                if (!problemsData.length) {
                    mainContainer.innerHTML = `<div class="loading-msg">No problems available.</div>`;
                    return;
                }
                const filtered = getFilteredProblems();
                const allTags = getAllTags();
                const states = loadStates();
                let html = `<div class="updates-panel" style="padding:0.5rem;">
                            <div class="updates-header"><h2>Problem Set</h2></div>
                            <div class="filter-bar"><span style="font-weight:600;">Filter:</span>
                            <button class="filter-tag-btn ${activeTag === null ? 'active' : ''}" data-tag="">All</button>`;
                allTags.forEach(tag => {
                    html += `<button class="filter-tag-btn ${activeTag === tag ? 'active' : ''}" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`;
                });
                html += `</div><div class="problems-list">`;
                if (filtered.length === 0) {
                    html += `<div class="problem-item" style="justify-content:center;">No problems match.</div>`;
                } else {
                    filtered.forEach(prob => {
                        const state = states[prob.id] || 'not_started';
                        const stateClass = getStateClass(state);
                        html += `<div class="problem-item ${stateClass}" data-id="${prob.id}">
                                    <span class="problem-id">${prob.id}</span>
                                    <span class="problem-name" title="${escapeHtml(prob.name)}">${escapeHtml(prob.name)}</span>
                                    <div class="tags-container">${prob.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                                    <span class="difficulty">Lv. ${prob.difficulty.toFixed(1)}</span>
                                </div>`;
                    });
                }
                html += `</div></div>`;
                mainContainer.innerHTML = html;

                document.querySelectorAll('.problem-item').forEach(el => {
                    const id = parseInt(el.getAttribute('data-id'));
                    if (id) {
                        el.addEventListener('click', () => {
                            window.location.href = `problems.html?problem_id=${id}`;
                        });
                    }
                });

                document.querySelectorAll('.filter-tag-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const tag = btn.getAttribute('data-tag');
                        activeTag = (tag === "") ? null : (activeTag === tag ? null : tag);
                        renderProblemList();
                    });
                });
            }

            function renderProblemDetail(problemId) {
                const prob = problemsData.find(p => p.id === problemId);
                if (!prob) {
                    renderProblemList();
                    return;
                }
                const currentState = getProblemState(problemId);
                const diffStr = prob.difficulty.toFixed(1);
                const tagsStr = prob.tags.join(', ');
                const html = `<div class="problem-detail">
                    <div class="detail-header">
                        <button class="back-btn" id="backToListBtn">← Back</button>
                        <span class="problem-name-detail">${escapeHtml(prob.name)}</span>
                        <span style="margin-left:auto; font-size:0.8rem;">Lv. ${diffStr}</span>
                        <span style="font-size:0.8rem;">${escapeHtml(tagsStr)}</span>
                    </div>
                    <div class="answer-area">
                        <label style="font-weight:500;">Your Answer:</label>
                        <input type="text" id="answerInput" class="answer-input" placeholder="Enter answer" autocomplete="off">
                        <button id="checkAnswerBtn" class="check-btn">Check</button>
                        <button id="submissionsBtn" class="submissions-btn">Submissions</button>
                        <span id="feedbackMsg" class="feedback"></span>
                    </div>
                    <div class="statement-content" id="statementContent">${prob.statement}</div>
                </div>`;
                mainContainer.innerHTML = html;

                const stmtDiv = document.getElementById('statementContent');
                if (stmtDiv && typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(stmtDiv, { delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}] });
                }

                const backBtn = document.getElementById('backToListBtn');
                if (backBtn) backBtn.addEventListener('click', () => { removeUrlParam('problem_id'); renderProblemList(); });

                const subBtn = document.getElementById('submissionsBtn');
                if (subBtn) subBtn.addEventListener('click', () => { window.location.href = `submissions.html?problem_id=${problemId}`; });

                const checkBtn = document.getElementById('checkAnswerBtn');
                const input = document.getElementById('answerInput');
                const fb = document.getElementById('feedbackMsg');
                if (checkBtn && input) {
                    checkBtn.addEventListener('click', () => {
                        const val = input.value.trim();
                        if (val === "") { fb.textContent = "Enter answer"; fb.className = "feedback wrong"; return; }
                        const num = parseFloat(val);
                        if (isNaN(num)) { fb.textContent = "Enter a number"; fb.className = "feedback wrong"; return; }
                        const isCorrect = Math.abs(num - prob.ans) < 1e-6;
                        addSubmission(prob.id, val, isCorrect);
                        if (isCorrect) {
                            if (currentState !== 'passed') updateProblemState(prob.id, 'passed');
                            fb.textContent = currentState === 'passed' ? "Accepted (Already solved)" : "Accepted";
                            fb.className = "feedback correct";
                        } else {
                            if (currentState !== 'passed') updateProblemState(prob.id, 'failed');
                            fb.textContent = "Wrong Answer";
                            fb.className = "feedback wrong";
                        }
                    });
                }
            }

            function initRouting() {
                const problemIdParam = getUrlParam('problem_id');
                if (problemIdParam) {
                    const pid = parseInt(problemIdParam);
                    if (!isNaN(pid) && problemsData.some(p => p.id === pid)) {
                        renderProblemDetail(pid);
                    } else {
                        renderProblemList();
                    }
                } else {
                    renderProblemList();
                }
                window.addEventListener('popstate', () => {
                    const newParam = getUrlParam('problem_id');
                    if (newParam) {
                        const newPid = parseInt(newParam);
                        if (!isNaN(newPid) && problemsData.some(p => p.id === newPid)) {
                            renderProblemDetail(newPid);
                        } else {
                            renderProblemList();
                        }
                    } else {
                        renderProblemList();
                    }
                });
            }

            function escapeHtml(str) {
                return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
            }

            // 加载外部数据
            function loadExternalData() {
                // 优先检查 window.problemsData（如果通过 script 标签全局定义）
                if (window.problemsData && Array.isArray(window.problemsData) && window.problemsData.length) {
                    problemsData = window.problemsData;
                    dataLoaded = true;
                    initRouting();
                    return;
                }

                // 否则 fetch JSON 文件
                fetch(PROBLEMS_DATA_URL)
                    .then(response => {
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return response.json();
                    })
                    .then(data => {
                        if (Array.isArray(data) && data.length) {
                            problemsData = data;
                        } else {
                            throw new Error('Invalid data format');
                        }
                        dataLoaded = true;
                        initRouting();
                    })
                    .catch(err => {
                        console.warn('Failed to load external problems data, using fallback:', err);
                        problemsData = fallbackData;
                        dataLoaded = true;
                        initRouting();
                    });
            }

            // 启动
            loadExternalData();
        })();
    </script>
</body>
</html>
