<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WYK Maths Team - Dev Terminal</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="auth.js"></script>
    <script src="app.js" defer></script>
    <style>
        .terminal-container {
            background: #1e1e2f;
            color: #c5c8c6;
            font-family: 'Fira Code', 'Consolas', monospace;
            border-radius: 8px;
            padding: 1rem;
            min-height: 500px;
        }
        .terminal-output {
            background: #0a0a12;
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.85rem;
        }
        .terminal-line {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .terminal-prompt {
            color: #4af;
            font-weight: bold;
        }
        .terminal-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: monospace;
            font-size: 0.9rem;
            flex: 1;
            outline: none;
        }
        .info-note {
            background: #ffffff;
            padding: 0.5rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: var(--accent-hover); }
    </style>
</head>
<body class="index-body">
    <div id="appContainer">
        <header class="topbar">
            <div class="topbar-left"><span class="brand-name"><a href="./index.html">WYK Maths Team</a></span></div>
            <div class="topbar-right">
                <div class="user-menu" id="userMenu" style="cursor: pointer;">
                    <span class="username-display"><span class="user-icon">👤</span><span id="currentUsername">Guest</span><span class="dropdown-arrow">▾</span></span>
                    <div class="logout-dropdown"><button class="logout-btn" id="logoutBtn">Logout</button></div>
                </div>
                <div class="clock"><span class="clock-time" id="clockTime">00:00:00</span></div>
            </div>
        </header>
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav"><ul>
                <li><a href="./problems.html" class="sidebar-link require-login">Problems</a></li>
                <li><a href="./submissions.html" class="sidebar-link require-login">Your submissions</a></li>
                <li><a href="./ssubmissions.html" class="sidebar-link require-login">All submissions</a></li>
                <li><a href="./resources.html" class="sidebar-link require-login">Resources</a></li>
                <li><a href="./ranklist.html" class="sidebar-link require-login">Leaderboard</a></li>
                <li><a href="./terminal.html" class="sidebar-link require-login active">(Dev)Terminal</a></li>
                <li><a href="./admin.html" class="sidebar-link require-login">Messages</a></li>
                <li><a href="./template.html" class="sidebar-link require-login">Settings</a></li>
            </ul></nav>
        </aside>
        <main class="main-content" id="mainContent">
            <div class="updates-panel" style="padding:1rem;">
                <div class="updates-header"><h2>Developer Terminal</h2></div>
                
                <div class="terminal-container">
                    <div class="terminal-output" id="terminalOutput">
                        > Terminal ready. Loading problems data...<br>
                    </div>
                    <div class="terminal-line">
                        <span class="terminal-prompt">$&nbsp;</span>
                        <input type="text" id="terminalInput" class="terminal-input" autofocus>
                    </div>
                </div>
            </div>
        </main>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">☰</button>
    </div>

    <div id="loginModal" class="modal-overlay" style="display: none;"><!-- 与之前相同 --></div>

    <script>
        // 登录检查：未登录则跳转到首页
        if (typeof isLoggedIn === 'function' && !isLoggedIn()) {
            window.location.href = 'index.html';
        }

        // ---------- 获取当前用户名（与 problems.html 保持一致）----------
        function getCurrentUserName() {
            if (typeof getCurrentUser === 'function') {
                const user = getCurrentUser();
                if (user && (user.username || user.displayName)) {
                    return user.username || user.displayName;
                }
            }
            return 'guest';
        }

        const currentUser = getCurrentUserName();

        // ---------- 存储键构造 ----------
        function getStatesKey() {
            return `problemStates_${currentUser}`;
        }
        function getSubmissionsKey() {
            return `submissions_${currentUser}`;
        }

        // ---------- 读取/写入状态 ----------
        function loadStates() {
            const key = getStatesKey();
            const stored = localStorage.getItem(key);
            if (!stored) return {};
            try {
                return JSON.parse(stored);
            } catch(e) {
                return {};
            }
        }
        function saveStates(states) {
            localStorage.setItem(getStatesKey(), JSON.stringify(states));
        }

        // ---------- 读取/写入提交记录 ----------
        function loadSubmissions() {
            const key = getSubmissionsKey();
            const stored = localStorage.getItem(key);
            if (!stored) return [];
            try {
                return JSON.parse(stored);
            } catch(e) {
                return [];
            }
        }
        function saveSubmissions(subs) {
            localStorage.setItem(getSubmissionsKey(), JSON.stringify(subs));
        }

        // ---------- 删除所有数据 ----------
        function deleteAllData() {
            localStorage.removeItem(getStatesKey());
            localStorage.removeItem(getSubmissionsKey());
        }

        // ---------- 删除所有状态 ----------
        function deleteAllStates() {
            localStorage.removeItem(getStatesKey());
        }

        // ---------- 删除所有提交记录 ----------
        function deleteAllSubmissions() {
            localStorage.removeItem(getSubmissionsKey());
        }

        // ---------- 删除指定题目的状态 ----------
        function deleteStateByProblemId(problemId) {
            const states = loadStates();
            if (states.hasOwnProperty(problemId)) {
                delete states[problemId];
                saveStates(states);
                return true;
            }
            return false;
        }

        // ---------- 删除指定题目的所有提交记录 ----------
        function deleteSubmissionsByProblemId(problemId) {
            const subs = loadSubmissions();
            const newSubs = subs.filter(s => s.problemId !== problemId);
            if (newSubs.length !== subs.length) {
                saveSubmissions(newSubs);
                return true;
            }
            return false;
        }

        // ---------- 解析 remove 命令 ----------
        function parseRemoveCommand(cmd) {
            const mainMatch = cmd.match(/^remove\(\)(?:\.(status|sub)(?:\.qn\((\d+)\)|\((\d+)\)))?$/);
            if (!mainMatch) return null;
            const type = mainMatch[1];
            const qnId = mainMatch[2];
            const subId = mainMatch[3];
            let id = null;
            if (qnId !== undefined) id = parseInt(qnId);
            if (subId !== undefined) id = parseInt(subId);
            return { type, id };
        }

        // 列出当前用户的状态
        function listStates() {
            const states = loadStates();
            const keys = Object.keys(states);
            if (keys.length === 0) return "No problem states found.";
            let lines = [];
            for (let id of keys) {
                lines.push(`Problem ${id}: ${states[id]}`);
            }
            return lines.join('\n');
        }

        // ========== 新增：加载题目数据并判断答案是否为数字 ==========
        let problemsData = [];
        let problemsLoaded = false;
        const PROBLEMS_DATA_URL = './qs.json';

        // 与 problems.html 一致的严格数字判断
        function isStrictNumericString(str) {
            if (typeof str !== 'string') str = String(str);
            str = str.trim();
            if (str === '') return false;
            const numericRegex = /^[+-]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][+-]?\d+)?$/;
            return numericRegex.test(str);
        }

        function loadProblemsData() {
            return fetch(PROBLEMS_DATA_URL)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    if (Array.isArray(data) && data.length) {
                        problemsData = data;
                    } else {
                        throw new Error('Invalid data format');
                    }
                    problemsLoaded = true;
                    appendOutput("> Problems data loaded successfully.");
                })
                .catch(err => {
                    console.warn('Failed to load problems data:', err);
                    appendOutput("> Warning: Could not load problems data. 'list err' will not work.");
                    problemsLoaded = false;
                });
        }

        // 列出所有答案非数字的题目 ID
        function listNonNumericProblems() {
            if (!problemsLoaded) {
                return "Problems data not loaded yet. Please wait or reload the page.";
            }
            const nonNumericIds = [];
            for (const prob of problemsData) {
                const ansStr = String(prob.ans);
                if (!isStrictNumericString(ansStr)) {
                    nonNumericIds.push(prob.id);
                }
            }
            if (nonNumericIds.length === 0) {
                return "All problems have numeric answers.";
            }
            return `Problems with non-numeric answers (IDs): ${nonNumericIds.join(', ')}`;
        }

        // ---------- 终端 UI ----------
        const outputDiv = document.getElementById('terminalOutput');
        const inputField = document.getElementById('terminalInput');

        function appendOutput(text) {
            outputDiv.innerHTML += text + '\n';
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        function processCommand(cmdLine) {
            const cmd = cmdLine.trim();
            if (cmd === "") return;

            // 帮助
            if (cmd === 'help') {
                appendOutput("Available commands:\n" +
                    "  remove()                - Delete ALL data (states + submissions)\n" +
                    "  remove().status         - Delete all problem states\n" +
                    "  remove().sub             - Delete all submissions\n" +
                    "  remove().status.qn(#)   - Delete state for problem #\n" +
                    "  remove().sub(#)         - Delete submissions for problem #\n" +
                    "  list                    - Show current user's problem states\n" +
                    "  list err                - Show all problem IDs with non-numeric answers\n" +
                    "  clear                   - Clear terminal output\n" +
                    "  help                    - Show this help");
                return;
            }
            if (cmd === 'clear') {
                outputDiv.innerHTML = "";
                appendOutput("> Terminal cleared.");
                return;
            }
            if (cmd === 'list') {
                appendOutput(listStates());
                return;
            }
            if (cmd === 'list err') {
                appendOutput(listNonNumericProblems());
                return;
            }

            // 尝试解析 remove 类命令
            const parsed = parseRemoveCommand(cmd);
            if (parsed) {
                const { type, id } = parsed;
                if (type === undefined) {
                    deleteAllData();
                    appendOutput("All data (states + submissions) deleted for current user.");
                } else if (type === 'status' && id === null) {
                    deleteAllStates();
                    appendOutput("All problem states deleted for current user.");
                } else if (type === 'sub' && id === null) {
                    deleteAllSubmissions();
                    appendOutput("All submissions deleted for current user.");
                } else if (type === 'status' && id !== null) {
                    const success = deleteStateByProblemId(id);
                    if (success) appendOutput(`State for problem #${id} deleted.`);
                    else appendOutput(`Problem #${id} not found in states.`);
                } else if (type === 'sub' && id !== null) {
                    const success = deleteSubmissionsByProblemId(id);
                    if (success) appendOutput(`Submissions for problem #${id} deleted.`);
                    else appendOutput(`No submissions found for problem #${id}.`);
                } else {
                    appendOutput("Invalid remove syntax. Use help for examples.");
                }
                return;
            }

            appendOutput(`Unknown command: ${cmd}. Type 'help' for commands.`);
        }

        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputField.value;
                if (cmd.trim() === "") return;
                appendOutput(`$ ${cmd}`);
                processCommand(cmd);
                inputField.value = "";
            }
        });

        // 启动时加载题目数据
        loadProblemsData();
    </script>
</body>
</html>
