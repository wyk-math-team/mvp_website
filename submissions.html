<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WYK Maths Team - Submissions</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="auth.js"></script>
    <script src="app.js" defer></script>
    <style>
        /* 紧凑表格样式 - 与 problems 风格一致 */
        .submissions-panel {
            background: var(--card-bg);
            border-radius: 4px;
            padding: 0;
            box-shadow: var(--shadow-sm);
            overflow-x: auto;
        }
        .submissions-header {
            background: #e9ecef;
            padding: 0.5rem 0.8rem;
            border-bottom: 2px solid var(--border-color);
            display: grid;
            grid-template-columns: 100px 160px 1fr 120px 100px;  /* 新增 rejudge 列 */
            font-weight: 700;
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        .sortable {
            cursor: pointer;
            user-select: none;
        }
        .sortable:hover {
            background: #d0d7de;
            border-radius: 12px;
            padding: 0.1rem 0.3rem;
            margin: -0.1rem -0.3rem;
        }
        .submissions-list {
            display: flex;
            flex-direction: column;
        }
        .submission-item {
            display: grid;
            grid-template-columns: 100px 160px 1fr 120px 100px;  /* 与表头一致 */
            align-items: center;
            padding: 0.5rem 0.8rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            transition: background 0.1s;
        }
        .submission-item:last-child { border-bottom: none; }
        .submission-item:hover { background: #f8f9fa; }
        .submission-time {
            color: var(--text-secondary);
            font-family: monospace;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .submission-problem-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .submission-problem-link a:hover { text-decoration: underline; }
        .submission-answer {
            font-family: monospace;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .submission-status {
            font-weight: bold;
            text-align: right;
            white-space: nowrap;
        }
        .submission-correct { color: #2e7d32; }
        .submission-wrong { color: var(--danger); }
        .rejudge-btn {
            background: #6c757d;
            border: none;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: background 0.2s;
        }
        .rejudge-btn:hover {
            background: #5a6268;
        }
        .filter-info {
            background: #eef2ff;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 0.5rem 0.8rem;
            display: inline-block;
        }
        .back-link {
            color: var(--accent);
            text-decoration: none;
            margin-left: 0.5rem;
        }
        .updates-header {
            padding: 0.8rem 0.8rem 0 0.8rem;
        }
        @media (max-width: 750px) {
            .submissions-header, .submission-item {
                grid-template-columns: 80px 130px 1fr 90px 80px;
            }
            .submission-time { font-size: 0.7rem; }
            .rejudge-btn { padding: 0.1rem 0.4rem; font-size: 0.65rem; }
        }
        @media (max-width: 600px) {
            .submissions-header, .submission-item {
                grid-template-columns: 70px 110px 1fr 70px 70px;
            }
        }
    </style>
</head>
<body class="index-body">
    <div id="appContainer">
        <header class="topbar">
            <div class="topbar-left"><span class="brand-name"><a href="./index.html">WYK Maths Team</a></span></div>
            <div class="topbar-right">
                <div class="user-menu" id="userMenu" style="cursor: pointer;">
                    <span class="username-display"><span class="user-icon">👤</span><span id="currentUsername">Guest</span><span class="dropdown-arrow">▾</span></span>
                    <div class="logout-dropdown"><button class="logout-btn" id="logoutBtn">Logout</button></div>
                </div>
                <div class="clock"><span class="clock-time" id="clockTime">00:00:00</span></div>
            </div>
        </header>
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav"><ul>
                <li><a href="./problems.html" class="sidebar-link require-login">Problems</a></li>
                <li><a href="./submissions.html" class="sidebar-link require-login active">Your submissions</a></li>
                <li><a href="./ssubmissions.html" class="sidebar-link require-login">All submissions</a></li>
                <li><a href="./resources.html" class="sidebar-link require-login">Resources</a></li>
                <li><a href="./ranklist.html" class="sidebar-link require-login">Leaderboard</a></li>
                <li><a href="./terminal.html" class="sidebar-link require-login">(Dev)Terminal</a></li>
                <li><a href="./admin.html" class="sidebar-link require-login">Messages</a></li>
                <li><a href="./template.html" class="sidebar-link require-login">Settings</a></li>
            </ul></nav>
        </aside>
        <main class="main-content" id="mainContent">
            <div class="submissions-panel" id="submissionsContainer">
                <!-- 动态内容 -->
            </div>
        </main>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">☰</button>
    </div>

    <!-- 登录模态框 -->
    <div id="loginModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header"><h2>Sign In Required</h2><button class="modal-close" id="closeModalBtn">&times;</button></div>
            <form id="modalLoginForm">
                <div class="form-group"><label for="modalUsername">Username</label><input type="text" id="modalUsername" placeholder="Username" required></div>
                <div class="form-group"><label for="modalPassword">Password</label><input type="password" id="modalPassword" placeholder="Password" required></div>
                <div id="modalLoginError" class="login-error hidden"></div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <p class="login-hint">Demo accounts: admin / admin123  •  user1 / password1</p>
        </div>
    </div>

    <script>
        // ========== 登录检查 ==========
        if (typeof isLoggedIn === 'function' && !isLoggedIn()) {
            window.location.href = 'index.html';
        }

        // ========== 获取当前用户名（用于数据隔离）==========
        function getCurrentUserName() {
            if (typeof getCurrentUser === 'function') {
                const user = getCurrentUser();
                if (user && (user.username || user.displayName)) {
                    return user.username || user.displayName;
                }
            }
            return 'guest';
        }

        // ---------- 题目数据加载与答案判断 ----------
        let problemsData = [];
        let problemsLoaded = false;
        const PROBLEMS_DATA_URL = './qs.json';

        function isStrictNumericString(str) {
            if (typeof str !== 'string') str = String(str);
            str = str.trim();
            if (str === '') return false;
            const numericRegex = /^[+-]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][+-]?\d+)?$/;
            return numericRegex.test(str);
        }

        // 判断用户答案是否正确
        function isAnswerCorrect(problemAns, userAnswer) {
            const ansStr = String(problemAns).trim();
            if (!isStrictNumericString(ansStr)) {
                // 题目答案不是数字 -> 永远错误
                return false;
            }
            const correctNum = parseFloat(ansStr);
            const userNum = parseFloat(userAnswer.trim());
            if (isNaN(userNum)) return false;
            return Math.abs(userNum - correctNum) < 1e-6;
        }

        function loadProblemsData() {
            return fetch(PROBLEMS_DATA_URL)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    if (Array.isArray(data) && data.length) {
                        problemsData = data;
                    } else {
                        throw new Error('Invalid data format');
                    }
                    problemsLoaded = true;
                })
                .catch(err => {
                    console.warn('Failed to load problems data:', err);
                    problemsLoaded = false;
                });
        }

        // ---------- 存储操作 ----------
        const currentUser = getCurrentUserName();
        const STORAGE_KEY_SUBMISSIONS = `submissions_${currentUser}`;
        const STORAGE_KEY_STATES = `problemStates_${currentUser}`;

        function getSubmissions() {
            const stored = localStorage.getItem(STORAGE_KEY_SUBMISSIONS);
            if (!stored) return [];
            try { return JSON.parse(stored); } catch(e) { return []; }
        }

        function saveSubmissions(subs) {
            localStorage.setItem(STORAGE_KEY_SUBMISSIONS, JSON.stringify(subs));
        }

        function loadProblemStates() {
            const stored = localStorage.getItem(STORAGE_KEY_STATES);
            if (!stored) return {};
            try { return JSON.parse(stored); } catch(e) { return {}; }
        }

        function saveProblemStates(states) {
            localStorage.setItem(STORAGE_KEY_STATES, JSON.stringify(states));
        }

        // 重新判定某条提交，并更新问题状态
        async function rejudgeSubmission(submission, index, allSubmissions) {
            if (!problemsLoaded) {
                await loadProblemsData(); // 确保数据已加载
            }
            if (!problemsLoaded) {
                alert("无法加载题目数据，请刷新页面重试。");
                return false;
            }
            const problem = problemsData.find(p => p.id === submission.problemId);
            if (!problem) {
                alert(`题目 #${submission.problemId} 不存在，无法重新判定。`);
                return false;
            }
            const newIsCorrect = isAnswerCorrect(problem.ans, submission.answer);
            if (newIsCorrect === submission.isCorrect) {
                // 没有变化，无需更新
                return false;
            }
            // 更新该提交
            submission.isCorrect = newIsCorrect;
            // 保存所有提交
            saveSubmissions(allSubmissions);
            // 重新计算该问题的整体状态
            const relevantSubs = allSubmissions.filter(s => s.problemId === submission.problemId);
            let newState = 'not_started';
            if (relevantSubs.some(s => s.isCorrect === true)) {
                newState = 'passed';
            } else if (relevantSubs.length > 0) {
                newState = 'failed';
            }
            const states = loadProblemStates();
            if (states[submission.problemId] !== newState) {
                states[submission.problemId] = newState;
                saveProblemStates(states);
            }
            return true;
        }

        // ---------- 排序与渲染 ----------
        let sortField = 'timestamp';
        let sortOrder = 'desc';

        function sortSubmissions(submissions) {
            return [...submissions].sort((a, b) => {
                let valA, valB;
                switch (sortField) {
                    case 'timestamp':
                        valA = new Date(a.timestamp);
                        valB = new Date(b.timestamp);
                        break;
                    case 'problemId':
                        valA = a.problemId;
                        valB = b.problemId;
                        break;
                    case 'answer':
                        valA = a.answer.toLowerCase();
                        valB = b.answer.toLowerCase();
                        break;
                    case 'status':
                        valA = a.isCorrect ? 1 : 0;
                        valB = b.isCorrect ? 1 : 0;
                        break;
                    default:
                        valA = 0; valB = 0;
                }
                if (valA < valB) return sortOrder === 'asc' ? -1 : 1;
                if (valA > valB) return sortOrder === 'asc' ? 1 : -1;
                return 0;
            });
        }

        async function render() {
            const problemIdFilter = getProblemIdFromUrl();
            let submissions = getSubmissions();
            let filtered = problemIdFilter ? submissions.filter(s => s.problemId === problemIdFilter) : submissions;
            filtered = sortSubmissions(filtered);

            const container = document.getElementById('submissionsContainer');
            let html = `<div class="updates-header"><h2>Your Submissions</h2></div>`;
            if (problemIdFilter) {
                html += `<div class="filter-info">🔍 Showing submissions for Problem #${problemIdFilter} <a href="./problems.html" class="back-link">← Back to problems</a></div>`;
            } else {
                html += `<div class="filter-info">All submissions <a href="./problems.html" class="back-link">← Back to problems</a></div>`;
            }

            if (filtered.length === 0) {
                html += `<p style="padding: 1rem; text-align: center; color: var(--text-secondary);">No submissions found.</p>`;
            } else {
                const getSortIndicator = (field) => {
                    if (sortField !== field) return '';
                    return sortOrder === 'asc' ? ' ↑' : ' ↓';
                };
                html += `<div class="submissions-list">
                            <div class="submissions-header">
                                <span class="sortable" data-sort="rejudge">Rejudge</span>
                                <span class="sortable" data-sort="timestamp">Time${getSortIndicator('timestamp')}</span>
                                <span class="sortable" data-sort="problemId">Problem${getSortIndicator('problemId')}</span>
                                <span class="sortable" data-sort="answer">Answer${getSortIndicator('answer')}</span>
                                <span class="sortable" data-sort="status">Status${getSortIndicator('status')}</span>
                            </div>`;
                for (let i = 0; i < filtered.length; i++) {
                    const sub = filtered[i];
                    const date = new Date(sub.timestamp).toLocaleString();
                    const statusClass = sub.isCorrect ? 'submission-correct' : 'submission-wrong';
                    const statusText = sub.isCorrect ? 'Accepted' : 'Wrong Answer';
                    const globalIndex = submissions.findIndex(s => s.timestamp === sub.timestamp && s.answer === sub.answer);
                    html += `<div class="submission-item" data-submission-index="${globalIndex}">
                                <div class="rejudge-cell">
                                    <button class="rejudge-btn" data-index="${globalIndex}">↻</button>
                                </div>
                                <div class="submission-time" title="${escapeHtml(date)}">${escapeHtml(date)}</div>
                                <div class="submission-problem-link"><a href="./problems.html?problem_id=${sub.problemId}">Problem #${sub.problemId}</a></div>
                                <div class="submission-answer" title="${escapeHtml(sub.answer)}">${escapeHtml(sub.answer)}</div>
                                <div class="submission-status ${statusClass}">${statusText}</div>
                            </div>`;
                }
                html += `</div>`;
            }
            container.innerHTML = html;

            // 绑定排序事件
            document.querySelectorAll('.sortable').forEach(el => {
                const field = el.getAttribute('data-sort');
                if (field === 'rejudge') return; // rejudge 列不可排序
                el.addEventListener('click', (e) => {
                    if (sortField === field) {
                        sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortField = field;
                        sortOrder = 'asc';
                    }
                    render();
                });
            });

            // 绑定 Rejudge 按钮事件
            document.querySelectorAll('.rejudge-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.getAttribute('data-index'));
                    if (isNaN(idx)) return;
                    const allSubs = getSubmissions();
                    if (idx < 0 || idx >= allSubs.length) return;
                    const targetSub = allSubs[idx];
                    // 显示加载状态
                    const originalText = btn.textContent;
                    btn.textContent = '...';
                    btn.disabled = true;
                    const changed = await rejudgeSubmission(targetSub, idx, allSubs);
                    if (changed) {
                        // 重新渲染表格
                        await render();
                    } else {
                        btn.textContent = originalText;
                        btn.disabled = false;
                        if (!changed && targetSub.isCorrect !== undefined) {
                            alert("答案判定结果与之前相同，未发生变化。");
                        }
                    }
                });
            });
        }

        function getProblemIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('problem_id');
            return id ? parseInt(id) : null;
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }

        // 初始化：加载题目数据后渲染
        (async function init() {
            await loadProblemsData();
            render();
        })();
    </script>
</body>
</html>
